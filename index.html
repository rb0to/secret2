<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For u ♡</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #fff0f5;
      padding: 20px;
    }
    .hidden {
      display: none;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      border-radius: 10px;
      border: none;
      background-color: #ff69b4;
      color: white;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Hey u hehe ♡</h1>
<p>I made this just for u hehe</p>

<button class="surprise-btn">Click me hehe</button>

<div id="secretMsg" class="hidden">
  <p>hehe... i just wanted to say u mean a lot to me ♡</p>
  <p>and i hope this made u smile hehe</p>
</div>

<audio id="bgMusic" autoplay loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// reveal message + ensure music plays
const music = document.getElementById("bgMusic");

// try autoplay (may be blocked)
window.addEventListener("load", () => {
  music.play().catch(() => {
    console.log("Autoplay blocked hehe");
  });
});

// fallback: play on first click
window.addEventListener("click", () => {
  music.play();
}, { once: true });

// surprise button

document.querySelector('.surprise-btn').onclick = function() {
  document.getElementById('secretMsg').style.display = 'block';
};
</script>

</body>
</html>
